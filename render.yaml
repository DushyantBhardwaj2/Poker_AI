services:
  # FastAPI Backend (AI Intelligence Engine)
  - type: web
    name: pokersense-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false # Set to your Neon Postgres URL
      - key: NEON_AUTH_URL
        sync: false # Set to your Neon Auth URL
      - key: ALLOWED_ORIGINS
        value: "https://poker-ai-black.vercel.app"
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 8000

  # Astro Frontend (Advisor HUD)
  - type: static
    name: pokersense-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: PUBLIC_API_URL
        fromService:
          type: web
          name: pokersense-api
          property: host
      - key: PUBLIC_NEON_AUTH_URL
        sync: false # Set to your Neon Auth URL
