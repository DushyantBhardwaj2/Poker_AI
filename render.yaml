services:
  # FastAPI Backend (AI Intelligence Engine)
  - type: web
    name: pokersense-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false # Set to your PostgreSQL connection string
      - key: NEON_AUTH_URL
        sync: false # Set to your Neon Auth URL
      - key: ALLOWED_ORIGINS
        value: "https://poker-ai-black.vercel.app"
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 8000
